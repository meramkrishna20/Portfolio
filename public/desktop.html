<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhisan OS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/desktop/css/os.css">
    <link rel="stylesheet" href="/desktop/css/apps.css">
    <link rel="stylesheet" href="/desktop/css/terminal.css">
</head>

<body>

    <!-- ─── POWER OFF SCREEN ─── -->
    <div id="power-screen" class="hidden">
        <div class="pw-content">
            <i class="fa-solid fa-power-off pw-icon"></i>
            <p class="pw-title">System Powered Off</p>
            <p class="pw-hint">
                Press <kbd>Space</kbd> or click the
                <i class="fa-solid fa-power-off"></i> button in the taskbar to restart
            </p>
        </div>
    </div>

    <!-- Desktop Background -->
    <div id="desktop-bg" style="background-image: url('/desktop/images/wallpaper.jpg');"></div>

    <!-- Desktop Icons -->
    <div id="desktop-icons">
        <div class="d-icon" data-app="cv" ondblclick="OS.openApp('cv')">
            <i class="fa-solid fa-file-pdf"></i>
            <span>Portfolio.pdf</span>
        </div>
        <div class="d-icon" data-app="spotify" ondblclick="OS.openApp('spotify')">
            <i class="fa-brands fa-spotify"></i>
            <span>Spotify</span>
        </div>
        <div class="d-icon" data-app="vlc" ondblclick="OS.openApp('vlc')">
            <i class="fa-solid fa-film"></i>
            <span>VLC Player</span>
        </div>
        <div class="d-icon" data-app="terminal" ondblclick="OS.openApp('terminal')">
            <i class="fa-solid fa-terminal"></i>
            <span>Terminal</span>
        </div>
    </div>

    <!-- Window Container -->
    <div id="window-area"></div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="t-start" id="start-btn">
            <i class="fa-brands fa-linux"></i> Menu
        </div>

        <div class="t-apps" id="taskbar-apps"></div>

        <div class="t-system">
            <div class="sys-tray">
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-volume-high"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
            <div id="clock">12:00 AM</div>
            <button id="power-btn" title="Power off" onclick="OS.powerOff()">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="hidden">
        <div class="sm-sidebar">
            <i class="fa-solid fa-user"></i>
            <i class="fa-solid fa-gear"></i>
            <i class="fa-solid fa-power-off" onclick="OS.powerOff()"></i>
        </div>
        <div class="sm-apps">
            <div class="sm-item" onclick="OS.openApp('cv'); OS.toggleStart()">
                <i class="fa-solid fa-file-pdf"></i> Portfolio.pdf
            </div>
            <div class="sm-item" onclick="OS.openApp('spotify'); OS.toggleStart()">
                <i class="fa-brands fa-spotify"></i> Spotify
            </div>
            <div class="sm-item" onclick="OS.openApp('vlc'); OS.toggleStart()">
                <i class="fa-solid fa-film"></i> VLC Player
            </div>
            <div class="sm-item" onclick="OS.openApp('terminal'); OS.toggleStart()">
                <i class="fa-solid fa-terminal"></i> Terminal
            </div>
        </div>
    </div>

    <!-- ─── APP TEMPLATES ─── -->

    <!-- SPOTIFY -->
    <template id="tpl-spotify">
        <div class="app-spotify">
            <!-- Sidebar -->
            <div class="s-sidebar">
                <div class="s-logo">
                    <i class="fa-brands fa-spotify"></i>
                    <span>Spotify</span>
                </div>
                <ul class="s-nav">
                    <li class="s-nav-active"><i class="fa-solid fa-house"></i> Home</li>
                    <li><i class="fa-solid fa-magnifying-glass"></i> Search</li>
                    <li><i class="fa-solid fa-book"></i> Your Library</li>
                </ul>
                <div class="s-library-section">
                    <div class="s-lib-header">
                        <span>My Playlists</span>
                        <i class="fa-solid fa-plus s-lib-add"></i>
                    </div>
                    <div class="s-playlist-item active-playlist">
                        <img src="/desktop/images/cover_pain.png" class="s-pl-cover" alt="">
                        <div class="s-pl-info">
                            <span class="s-pl-name">Bhisan's Mix</span>
                            <span class="s-pl-meta">Playlist • 3 songs</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main content -->
            <div class="s-main">
                <!-- Gradient header -->
                <div class="s-hero">
                    <img src="/desktop/images/cover_pain.png" class="s-hero-cover" alt="Playlist Cover">
                    <div class="s-hero-info">
                        <span class="s-hero-label">PLAYLIST</span>
                        <h1 class="s-hero-title">Bhisan's Mix</h1>
                        <p class="s-hero-meta">Bhisan • 3 songs, about 8 min</p>
                    </div>
                </div>

                <!-- Controls row -->
                <div class="s-controls-row">
                    <button class="s-big-play" id="sp-big-play" onclick="">
                        <i class="fa-solid fa-circle-play"></i>
                    </button>
                    <button class="s-shuffle-btn"><i class="fa-solid fa-shuffle"></i></button>
                    <button class="s-repeat-btn"><i class="fa-solid fa-repeat"></i></button>
                </div>

                <!-- Track list header -->
                <div class="s-tracklist-head">
                    <span class="th-num">#</span>
                    <span class="th-title">TITLE</span>
                    <span class="th-duration"><i class="fa-regular fa-clock"></i></span>
                </div>
                <div class="s-tracks" id="spotify-tracks"></div>
            </div>

            <!-- Bottom player bar -->
            <div class="s-player">
                <div class="p-info">
                    <img id="sp-cover" src="/desktop/images/cover_pain.png" width="56" height="56" alt="cover"
                        style="border-radius:4px;">
                    <div class="p-text">
                        <h4 id="sp-title">Select a track</h4>
                        <span id="sp-artist">...</span>
                    </div>
                    <i class="fa-regular fa-heart p-heart"></i>
                </div>
                <div class="p-controls">
                    <div class="p-btns">
                        <button class="p-btn-sm"><i class="fa-solid fa-shuffle"></i></button>
                        <button id="sp-prev" class="p-btn-sm"><i class="fa-solid fa-backward-step"></i></button>
                        <button id="sp-play" class="play-btn"><i class="fa-solid fa-circle-play"></i></button>
                        <button id="sp-next" class="p-btn-sm"><i class="fa-solid fa-forward-step"></i></button>
                        <button class="p-btn-sm"><i class="fa-solid fa-repeat"></i></button>
                    </div>
                    <div class="p-progress">
                        <span id="sp-time-cur">0:00</span>
                        <div class="p-seek-wrap">
                            <input type="range" id="sp-seek" value="0" min="0" max="100" style="--pct:0%">
                        </div>
                        <span id="sp-time-tot">0:00</span>
                    </div>
                </div>
                <div class="p-vol">
                    <i class="fa-solid fa-volume-high"></i>
                    <input type="range" id="sp-vol" value="100" min="0" max="100">
                </div>
            </div>
        </div>
    </template>

    <!-- TERMINAL -->
    <template id="tpl-terminal">
        <div class="app-terminal">
            <div class="term-output" id="term-output"></div>
            <div class="term-input-row">
                <span class="term-ps1">
                    <span class="ps1-user">bhisan</span><span class="ps1-host">@portfolio</span>:<span
                        class="ps1-dir">~</span>$
                </span>
                <input class="term-input" type="text" autocomplete="off" spellcheck="false"
                    placeholder="type a command...">
            </div>
        </div>
    </template>

    <!-- VLC -->
    <template id="tpl-vlc">
        <div class="app-vlc">
            <div class="vlc-video-container">
                <video id="vlc-vid" preload="none" playsinline></video>
            </div>
            <div class="vlc-controls">
                <div class="v-progress">
                    <input type="range" id="vlc-seek" value="0" min="0" max="100">
                </div>
                <div class="v-btns">
                    <button id="vlc-play"><i class="fa-solid fa-play"></i></button>
                    <button id="vlc-stop"><i class="fa-solid fa-stop"></i></button>
                    <span class="vlc-time" id="vlc-time">00:00 / 00:00</span>
                    <div style="flex:1"></div>
                    <button id="vlc-fullscreen"><i class="fa-solid fa-expand"></i></button>
                </div>
            </div>
        </div>
    </template>

    <!-- CV / PORTFOLIO -->
    <template id="tpl-cv">
        <div class="app-portfolio">
            <!-- Sidebar Navigation -->
            <nav class="port-sidebar">
                <div class="port-profile">
                    <div class="port-avatar"><i class="fa-solid fa-code"></i></div>
                    <h2>Bhisan</h2>
                    <p>Developer/Tech Enthusiast</p>
                </div>
                <nav class="port-nav">
                    <button class="p-nav-btn active" data-target="p-home">
                        <i class="fa-solid fa-house"></i> Home
                    </button>
                    <button class="p-nav-btn" data-target="p-about">
                        <i class="fa-solid fa-user"></i> About Me
                    </button>
                    <button class="p-nav-btn" data-target="p-hobbies">
                        <i class="fa-solid fa-gamepad"></i> Hobbies
                    </button>
                    <button class="p-nav-btn" data-target="p-skills">
                        <i class="fa-solid fa-file-contract"></i> Skills & CV
                    </button>
                </nav>
                <div class="port-quote">
                    "I don't know everything. But I know how to find it, break it, fix it, and pretend I knew all
                    along."
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="port-content">

                <!-- HOME SECTION -->
                <section id="p-home" class="port-section active">
                    <div class="p-header">
                        <h1>What brings you here?</h1>
                        <div class="p-accent-line"></div>
                    </div>
                    <div class="p-body">
                        <p class="p-lead">
                            Hi, I'm <span class="p-highlight">Bhisan Gaire</span> — a Full Stack Web Developer and
                            certified tech enthusiast who just survived a BCA degree at Patan Multiple Campus (Feb 2026,
                            officially unleashed).
                        </p>
                        <p>
                            Also a highly passionate video editor (half-baked, but the ambition is fully cooked).
                            Currently "working on myself," which is a fancy way of saying I'm broke 😂.
                        </p>
                        <p>
                            I'm the kind of person who'll learn anything cool at 2am, go down rabbit holes the internet
                            tried to hide, and somehow turn it into a side project nobody asked for. The stack is solid.
                            The editing timeline? Chaotic. The bank account? Let's not talk about it.
                        </p>

                        <div class="p-img-grid">
                            <!-- Added actual images -->
                            <div class="p-img-placeholder tall">
                                <img src="/desktop/images/littleone.PNG" alt="Little One" class="p-photo" />
                            </div>
                            <div class="p-img-placeholder wide">
                                <img src="/desktop/images/ai.png" alt="AI" class="p-photo" />
                            </div>
                        </div>
                    </div>
                </section>

                <!-- ABOUT SECTION -->
                <section id="p-about" class="port-section">
                    <div class="p-header">
                        <h1>About Me</h1>
                        <div class="p-accent-line"></div>
                    </div>
                    <div class="p-body">
                        <div class="p-row">
                            <div class="p-col">
                                <p>
                                    I was born an introvert — and I mean that in the most clinical way possible. Crowds?
                                    No thanks. Small talk? I'd rather debug a 500-line error with no Stack Overflow. I
                                    could go an entire week without uttering a single word to another human and
                                    genuinely not notice. My longest, deepest, most intellectual conversations have
                                    always been with myself. I'm great company, apparently.
                                </p>
                                <p>
                                    School was... an experience. I never remember enjoying studying, but I had a very
                                    special talent — the ability to absorb an entire semester the night before the exam
                                    and walk out like nothing happened. A few hours of panic, a cup of something warm,
                                    and somehow it worked every time. Still does. Is it a bad habit? Yes. Am I fixing
                                    it? Absolutely not.
                                </p>
                            </div>
                            <!-- Image slot -->
                            <div class="p-img-placeholder polaroid right-tilt">
                                <img src="/desktop/images/computer.png" alt="Portrait" class="p-photo" />
                            </div>
                        </div>

                        <p>
                            I was born in Palpa, around 2003 — a peaceful beginning before life decided to keep
                            relocating me. Class 1 through 5 in one place, then back to my hometown where I completed my
                            SEE from Darlamdanda Secondary School (survived). Then Kathmandu happened. Joined Pentagon
                            International College, Tinkune for Science in +2 (also survived), and eventually made it to
                            Patan Multiple Campus where I completed my BCA in February 2026 (barely, but a pass is a
                            pass).
                        </p>
                        <p class="p-punchline">
                            Somewhere between the late nights, the rabbit holes, the silent rooms, and the very
                            questionable life choices — I found <span class="p-highlight">tech</span>. And unlike group
                            projects, deadlines, and social gatherings, it's something I actually want to show up for.
                        </p>
                    </div>
                </section>

                <!-- HOBBIES SECTION -->
                <section id="p-hobbies" class="port-section">
                    <div class="p-header">
                        <h1>Hobbies <span class="p-subtitle">& Impulses</span></h1>
                        <div class="p-accent-line"></div>
                    </div>
                    <div class="p-body">
                        <p class="p-lead">Some people have structured hobbies. I have impulses. 🤷‍♂️</p>

                        <div class="p-row">
                            <!-- Image slot -->
                            <div class="p-img-placeholder polaroid" style="transform: rotate(-3deg);">
                                <img src="/desktop/images/walk.PNG" alt="Random Escape" class="p-photo" />
                            </div>

                            <div class="p-col">
                                <p>
                                    <strong>The Random Escapes:</strong> Waking up one random morning and deciding today
                                    is the day I disappear into the hills somewhere — no plan, no crowd, just me, some
                                    trees, and the kind of silence that actually makes sense to me 🌿.
                                </p>
                                <p>
                                    <strong>Music & Mind:</strong> Used to write songs. Now I've reached a point where I
                                    can hear a song in my head so vividly the entire environment just starts playing it
                                    for me. Either a superpower or a symptom. 🎵
                                </p>
                                <p>
                                    <strong>The Blender Grind:</strong> Currently my biggest dopamine hit. My laptop
                                    sounds like it's filing a formal complaint. The fan is screaming. The temperature is
                                    concerning. And I simply do not care. 🔥💀
                                </p>
                            </div>
                        </div>

                        <div class="p-row">
                            <div class="p-col">
                                <p>
                                    <strong>2AM Tech Holes:</strong> Video editing, digital art, gaming, Kali Linux,
                                    dark corners of the internet 🕳️, hacking concepts, flipping operating systems. If
                                    it exists on a screen, I've poked at it.
                                </p>
                                <p class="mt-4 p-punchline">
                                    <strong>Oh and — yes, that's Zoro everywhere.</strong> No, I'm not an anime freak.
                                    I've watched exactly one anime in my life — One Piece. Zoro inspires me — the
                                    dedication, the grind, the absolute refusal to give up. The only thing I'm not
                                    taking from him is his sense of direction.
                                </p>
                            </div>
                        </div>

                        <div class="p-img-placeholder wide glass-frame mt-4">
                            <img src="/desktop/images/back.jpeg" alt="Hobby Screenshot" class="p-photo" />
                        </div>
                    </div>
                </section>

                <!-- SKILLS / CV SECTION -->
                <section id="p-skills" class="port-section">
                    <div class="p-header">
                        <h1>Skills & Stuff I Actually Know</h1>
                        <div class="p-accent-line"></div>
                    </div>
                    <div class="p-body">
                        <p class="p-lead">Look, I'll keep this section relatively professional. Relatively.</p>

                        <div class="cv-grid">
                            <div class="cv-block">
                                <h3><i class="fa-brands fa-react"></i> Frontend</h3>
                                <p>React, JavaScript, TailwindCSS, Three.js, GSAP.</p>
                                <span class="cv-note">I build things that look good, move smoothly, and don't make users
                                    want to close the tab immediately. That's the goal at least.</span>
                            </div>

                            <div class="cv-block">
                                <h3><i class="fa-solid fa-server"></i> Backend</h3>
                                <p>Python, Django, Java, MySQL, PostgreSQL.</p>
                                <span class="cv-note">The less glamorous side of the internet that nobody sees but
                                    everything breaks without. I respect it.</span>
                            </div>

                            <div class="cv-block full-width">
                                <h3><i class="fa-solid fa-robot"></i> AI Tools</h3>
                                <p>I use them. Heavily.</p>
                                <span class="cv-note">Look — I went through years of actually figuring things out the
                                    hard way, and then AI showed up and made everything embarrassingly easy. Do I feel
                                    slightly guilty? Sometimes. Am I stopping? Absolutely not. Google on the other hand
                                    needs to calm down. 🤖</span>
                            </div>

                            <div class="cv-block full-width">
                                <h3><i class="fa-solid fa-brain"></i> Soft Skills</h3>
                                <p>Self-taught when curious, dangerously focused at 2am, works well alone (introvert,
                                    see About Me), and somehow always figures it out eventually.</p>
                            </div>
                        </div>
                    </div>
                </section>

            </main>
        </div>
    </template>

    <script src="/desktop/js/os.js"></script>
    <script src="/desktop/js/spotify.js"></script>
    <script src="/desktop/js/vlc.js"></script>
    <script src="/desktop/js/terminal.js"></script>
</body>

</html>
